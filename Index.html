<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MBA 長文本朗讀器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background: #f5f5f7; color: #1d1d1f; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        textarea { width: 100%; height: 50vh; margin-top: 15px; padding: 15px; border-radius: 8px; border: 1px solid #d2d2d7; font-size: 16px; line-height: 1.6; resize: vertical; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: #0071e3; color: white; font-weight: 500; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0077ed; }
        button.secondary { background: #86868b; }
        .slider-label { font-size: 14px; font-weight: bold; }
        #status { font-size: 13px; color: #86868b; }
    </style>
</head>
<body>

<div class="card">
    <h2>📖 英文長文本朗讀助手</h2>
    
    <div class="controls">
        <input type="file" id="pdf-upload" accept="application/pdf">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span class="slider-label">語速: <span id="speed-val">1.0</span>x</span>
            <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <button id="play">▶ 播放</button>
        <button id="pause" class="secondary">⏸ 暫停</button>
        <button id="stop" class="secondary">⏹ 停止</button>
        <button id="clear" style="background:#ff3b30;">清除文字</button>
    </div>

    <div id="status">準備就緒</div>
    <textarea id="text-input" placeholder="上傳 PDF 或在此貼上英文論文/案例..."></textarea>
</div>

<script>
    const synth = window.speechSynthesis;
    const textInput = document.getElementById('text-input');
    const status = document.getElementById('status');
    const speedEl = document.getElementById('speed');
    const speedVal = document.getElementById('speed-val');

    // 載入上次儲存的文字
    window.onload = () => {
        const savedText = localStorage.getItem('saved_essay');
        if (savedText) {
            textInput.value = savedText;
            status.innerText = "已載入上次儲存的文本";
        }
    };

    // PDF 解析
    document.getElementById('pdf-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        status.innerText = "正在解析 PDF...";
        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(item => item.str).join(" ") + "\n\n";
                status.innerText = `進度：${i} / ${pdf.numPages} 頁`;
            }
            textInput.value = fullText;
            localStorage.setItem('saved_essay', fullText);
            status.innerText = "解析完成並已自動儲存";
        };
        reader.readAsArrayBuffer(file);
    });

    // 監控文字變動並儲存
    textInput.addEventListener('input', () => {
        localStorage.setItem('saved_essay', textInput.value);
    });

    // 語音控制
    document.getElementById('play').addEventListener('click', () => {
        if (synth.paused) {
            synth.resume();
            return;
        }
        synth.cancel(); // 先停止之前的
        const utterance = new SpeechSynthesisUtterance(textInput.value);
        utterance.lang = 'en-US';
        utterance.rate = speedEl.value;
        utterance.onstart = () => status.innerText = "正在播放...";
        utterance.onend = () => status.innerText = "播放結束";
        synth.speak(utterance);
    });

    document.getElementById('pause').addEventListener('click', () => synth.pause());
    document.getElementById('stop').addEventListener('click', () => {
        synth.cancel();
        status.innerText = "已停止";
    });
    document.getElementById('clear').addEventListener('click', () => {
        if(confirm("確定要清除所有文字嗎？")) {
            textInput.value = "";
            localStorage.removeItem('saved_essay');
            status.innerText = "已清除";
        }
    });
    speedEl.addEventListener('input', (e) => {
        speedVal.innerText = e.target.value;
    });
</script>

</body>
</html>
