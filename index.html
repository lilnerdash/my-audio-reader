<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Reader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --primary: #0071e3;
            --bg: #f5f5f7;
            --card: rgba(255, 255, 255, 0.9);
            --text-main: #1d1d1f;
            --text-sec: #86868b;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 40px 20px;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 900px; }
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.4);
            margin-bottom: 25px;
        }
        h2 { font-weight: 600; font-size: 24px; margin-top: 0; margin-bottom: 25px; letter-spacing: -0.02em; }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 25px;
        }
        
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
        select, input[type="range"], button {
            width: 100%; border-radius: 12px; border: 1px solid #d2d2d7; padding: 12px; font-size: 15px; outline: none; box-sizing: border-box;
        }
        
        button {
            background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        button:hover { background: #0077ed; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,113,227,0.3); }
        button.secondary { background: #f5f5f7; color: var(--text-main); border: 1px solid #d2d2d7; }
        button.secondary:hover { background: #e8e8ed; }

        #text-input {
            width: 100%; height: 400px; border: none; background: transparent;
            font-size: 17px; line-height: 1.6; color: var(--text-main); outline: none; resize: vertical;
        }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-sec); padding-top: 15px; border-top: 1px solid #e8e8ed; }
        .highlight { background-color: #fff9c4; border-radius: 4px; padding: 2px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h2>Smart Reader Pro</h2>
        
        <div class="controls-grid">
            <div>
                <label>Voice Engine</label>
                <select id="voice-select"><option>Scanning voices...</option></select>
            </div>
            <div>
                <label>Reading Speed: <span id="speed-val">1.0</span>x</label>
                <input type="range" id="speed" min="0.5" max="2.5" step="0.1" value="1.0">
            </div>
        </div>

        <div class="controls-grid" style="grid-template-columns: 2fr 1fr 1fr 1fr;">
            <div>
                <label>Source File (PDF)</label>
                <input type="file" id="pdf-upload" accept="application/pdf">
            </div>
            <button id="play" style="align-self: end;">Play</button>
            <button id="pause" class="secondary" style="align-self: end;">Pause</button>
            <button id="stop" class="secondary" style="align-self: end;">Stop</button>
        </div>
        
        <div class="status-bar">
            <span id="status">Ready to analyze document.</span>
            <span id="page-count">0 Pages Loaded</span>
        </div>
    </div>

    <div class="glass-card">
        <label>Document Content</label>
        <textarea id="text-input" placeholder="The content of your PDF will appear here for review..."></textarea>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];
    let chunks = [];
    let currentChunkIndex = 0;

    function loadVoices() {
        // Filter for English voices and sort them to put premium ones first
        voices = synth.getVoices()
            .filter(v => v.lang.startsWith('en'))
            .sort((a, b) => b.name.includes('Premium') - a.name.includes('Premium'));
        
        const select = document.getElementById('voice-select');
        select.innerHTML = voices.map((v, i) => 
            `<option value="${i}">${v.name.replace('Microsoft', '').replace('Google', '')}</option>`
        ).join('');
    }
    
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }
    loadVoices();

    document.getElementById('pdf-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('status').textContent = "Extracting text...";
        
        const typedarray = new Uint8Array(await file.arrayBuffer());
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let fullText = "";
        
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            fullText += content.items.map(item => item.str).join(" ") + " ";
            document.getElementById('page-count').textContent = `Page ${i} / ${pdf.numPages}`;
        }
        
        document.getElementById('text-input').value = fullText;
        document.getElementById('status').textContent = "Analysis complete.";
    });

    function speakChunk(index) {
        if (index >= chunks.length) {
            document.getElementById('status').textContent = "Reading finished.";
            return;
        }

        currentChunkIndex = index;
        const utterance = new SpeechSynthesisUtterance(chunks[index]);
        const selectedVoiceIndex = document.getElementById('voice-select').value;
        utterance.voice = voices[selectedVoiceIndex];
        utterance.rate = document.getElementById('speed').value;

        utterance.onstart = () => {
            document.getElementById('status').textContent = `Reading segment ${index + 1} of ${chunks.length}`;
        };

        utterance.onend = () => {
            if (!synth.paused) speakChunk(index + 1);
        };

        synth.speak(utterance);
    }

    document.getElementById('play').addEventListener('click', () => {
        if (synth.paused) {
            synth.resume();
        } else {
            synth.cancel();
            const currentText = document.getElementById('text-input').value;
            // Split text into meaningful chunks (by sentences)
            chunks = currentText.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 0); 
            if (chunks.length > 0) speakChunk(0);
        }
    });

    document.getElementById('pause').addEventListener('click', () => synth.pause());
    document.getElementById('stop').addEventListener('click', () => {
        synth.cancel();
        document.getElementById('status').textContent = "Stopped.";
    });

    document.getElementById('speed').oninput = (e) => {
        document.getElementById('speed-val').textContent = e.target.value;
    };
</script>

</body>
</html>
